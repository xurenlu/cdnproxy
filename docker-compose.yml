version: '3.8'
services:
  cdnproxy:
    build: .
    restart: always
    ports:
      - "8080:8080"
    volumes:
      # 挂载数据目录，确保缓存和配置持久化
      - cdnproxy_data:/data
    environment:
      - PORT=8080
      - DATA_DIR=/data
      - CACHE_DIR=/data/cache
      - CACHE_TTL_SECONDS=43200
      - SESSION_TTL_SECONDS=86400
      # 管理员凭据（请务必修改为强密码！）
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=your_strong_password_here
    container_name: cdnproxy_app

volumes:
  cdnproxy_data:
