version: '3.8'
services:
  redis:
    image: redis:6-alpine
    restart: always
    volumes:
      - redis_data:/data
    container_name: cdnproxy_redis

  cdnproxy:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379/0
      # 可选：设置管理员凭据, 请务必修改为强密码
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=cdnproxy123!
    depends_on:
      - redis
    container_name: cdnproxy_app

volumes:
  redis_data:
