# 阿里云函数计算部署配置
ROSTemplateFormatVersion: '2015-09-01'
Transform: 'Aliyun::Serverless-2018-04-03'
Resources:
  cdnproxy:
    Type: 'Aliyun::Serverless::Service'
    Properties:
      Description: 'CDNProxy 云函数服务'
    cdnproxy-function:
      Type: 'Aliyun::Serverless::Function'
      Properties:
        Description: 'CDNProxy 主函数'
        CodeUri: './'
        Handler: 'main.AliyunFCMain'
        Runtime: go1.x
        MemorySize: 512
        Timeout: 30
        EnvironmentVariables:
          SERVERLESS_PLATFORM: aliyun
          CACHE_DIR: /tmp/cache
          DATA_DIR: /tmp/data
          CACHE_TTL_SECONDS: '43200'
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: '${env:ADMIN_PASSWORD}'
        Events:
          httpTrigger:
            Type: HTTP
            Properties:
              AuthType: ANONYMOUS
              Methods: ['GET', 'POST', 'PUT', 'DELETE', 'HEAD', 'OPTIONS']
              Path: '/{proxy+}'
