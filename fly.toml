# fly.toml app configuration file generated for cdnproxy on 2025-10-03T16:32:33+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cdnproxy'
primary_region = 'hkg'

[build]
  dockerfile = 'Dockerfile'

[env]
  ADMIN_USERNAME = 'admin'
  CACHE_TTL_SECONDS = '43200'
  CACHE_DIR = '/data/cache'
  DATA_DIR = '/data'
  PORT = '8080'
  SESSION_TTL_SECONDS = '86400'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.http_checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
